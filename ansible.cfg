[defaults]
# ==========================================
# 1. 基礎路徑設定
# ==========================================
# 告訴 Ansible 預設去哪裡找點名簿，這樣下指令就不用每次都加 -i inventory.ini
inventory = ./inventory.ini

# (進階) 未來如果你寫了 roles，可以指定 roles 的存放資料夾
# roles_path = ./roles

# ==========================================
# 2. 連線與安全設定 (實驗室特化)
# ==========================================
# 關閉 SSH 第一次連線時的 yes/no 指紋檢查 
host_key_checking = False

# ==========================================
# 3. 教學與畫面優化 (強烈推薦！)
# ==========================================
# 改變 Ansible 的輸出格式。預設的 JSON 格式如果報錯會擠成一團很難看，
# 改成 yaml 格式會讓報錯訊息換行對齊，除錯時會輕鬆 100 倍！
stdout_callback = yaml

# 關閉未來版本淘汰功能的警告訊息。保持終端機畫面乾淨，避免干擾閱讀核心 Log。
deprecation_warnings = False
