---
# tasks/disable_nat_netplan.yml
- name: "[Netplan] 尋找 NAT 網卡名稱 (搜尋 10.0.2.x 網段)"
  ansible.builtin.shell: |
    ip -4 addr show | grep 'inet 10.0.2.' | awk '{print $NF}'
  register: netplan_nat_iface
  changed_when: false

- name: "[Netplan] 尋找 Netplan 設定檔 (通常是 50-cloud-init.yaml 或 00-installer-config.yaml)"
  ansible.builtin.shell: ls /etc/netplan/*.yaml | head -n 1
  register: netplan_config_file
  when: netplan_nat_iface.stdout | default('') != ""
  changed_when: false
  ignore_errors: yes

- name: "[Netplan] 備份原始 Netplan 設定檔"
  ansible.builtin.copy:
    src: "{{ netplan_config_file.stdout }}"
    dest: "{{ netplan_config_file.stdout }}.bak"
    remote_src: yes
  when: 
    - netplan_config_file.stdout | default('') != ""
    - netplan_nat_iface.stdout | default('') != ""
  ignore_errors: yes

- name: "[Netplan] 移除 NAT 網卡的 DHCP 設定 (使用 sed 修改)"
  # 尋找該網卡名稱的區塊，並將 dhcp4 設為 false
  ansible.builtin.replace:
    path: "{{ netplan_config_file.stdout }}"
    regexp: '({{ netplan_nat_iface.stdout }}:\s*\n\s*)dhcp4:\s*(true|yes)'
    replace: '\1dhcp4: false'
  when: 
    - netplan_config_file.stdout | default('') != ""
    - netplan_nat_iface.stdout | default('') != ""
  register: netplan_modify
  ignore_errors: yes

- name: "[Netplan] 套用 Netplan 設定"
  ansible.builtin.command: netplan apply
  when: netplan_modify is changed
  ignore_errors: yes

- name: "[Netplan] 物理性關閉 NAT 網卡 (ip link set down)"
  ansible.builtin.command: "ip link set {{ netplan_nat_iface.stdout }} down"
  when: netplan_nat_iface.stdout | default('') != ""
  ignore_errors: yes
