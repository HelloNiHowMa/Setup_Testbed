---
# ==========================================
# Play 1: 處理現代艦隊 (允許收集 Facts)
# ==========================================
- name: 斷開並封印所有機器的 Vagrant NAT 網卡
  hosts: all:!bWAPP
  become: yes
  gather_facts: yes

  tasks:
    - name: 載入 Windows 處理邏輯
      ansible.builtin.include_tasks: tasks/disable_nat_windows.yml
      when: ansible_os_family == "Windows"

    - name: 載入 NetworkManager 處理邏輯 (RHEL 系與kali)
      ansible.builtin.include_tasks: tasks/disable_nat_nm.yml
      when: ansible_os_family == "RedHat"

    - name: 載入 Netplan 處理邏輯 (新版 Ubuntu)
      ansible.builtin.include_tasks: tasks/disable_nat_netplan.yml
      when: 
        - ansible_distribution == "Ubuntu"
        - ansible_distribution_major_version | int >= 18
       # 💡 新增這一段：讓 Kali 走 Debian 傳統邏輯
    - name: 載入 Legacy 處理邏輯 (Debian 系傳統設定，供 Kali 使用)
      ansible.builtin.include_tasks: tasks/disable_nat_legacy.yml
      when: ansible_distribution == "Kali"
      
# ==========================================
# Play 2: 處理活化石艦隊 (嚴禁收集 Facts)
# ==========================================
- name: 斷開並封印老古董的 NAT 網卡
  hosts: bWAPP       # 💡 關鍵：只針對老古董群組
  become: yes
  gather_facts: no   # 💡 終極防禦：禁止收集 Facts，保護老舊 Python

  tasks:
    - name: 載入 Legacy 處理邏輯 (老舊 Ubuntu)
      ansible.builtin.include_tasks: tasks/disable_nat_legacy.yml
      # 💡 刪除了 when 判斷！因為能進到這個 Play 的，絕對只有 bWAPP 群組裡的活化石
