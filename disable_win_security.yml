---
- name: "全面解除 Windows 靶機武裝 (防火牆與防毒)"
  # 💡 請確保你的 inventory.ini 裡面有一個 [windows] 群組包含所有 Windows 節點
  hosts: Windows 
  gather_facts: no # 關閉 facts 收集可以加快執行速度

  tasks:
    - name: "[Windows Defender] 將 C:\\ 加入排除清單 (避免惡意程式被秒殺)"
      ansible.windows.win_shell: |
        Add-MpPreference -ExclusionPath "C:\" -ErrorAction SilentlyContinue
      ignore_errors: yes

    - name: "[Windows Defender] 關閉即時防護與行為監控"
      ansible.windows.win_shell: |
        Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
        Set-MpPreference -DisableBehaviorMonitoring $true -ErrorAction SilentlyContinue
      ignore_errors: yes

    - name: "[Windows Firewall] 暴力關閉所有區域的防火牆 (Domain, Private, Public)"
      ansible.windows.win_shell: |
        netsh advfirewall set allprofiles state off
      register: firewall_result
      changed_when: "'Ok.' in firewall_result.stdout or '確定' in firewall_result.stdout"
      ignore_errors: yes

    - name: "[系統狀態] 顯示防火牆關閉結果"
      debug:
        msg: "防火牆已成功關閉！"
      when: firewall_result.rc == 0
