---
- name: "全面解除 Windows 靶機武裝 (防火牆與防毒)"
  hosts: Windows 
  gather_facts: no # 關閉 facts 收集可以加快執行速度

  tasks:

    - name: "[Windows Defender] 將 C:\\ 加入排除清單 (避免惡意程式被秒殺)"
      ansible.windows.win_shell: |
        Add-MpPreference -ExclusionPath "C:\" -ErrorAction SilentlyContinue
      ignore_errors: yes

    - name: "[Windows Defender] 關閉即時防護與行為監控"
      ansible.windows.win_shell: |
        Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
        Set-MpPreference -DisableBehaviorMonitoring $true -ErrorAction SilentlyContinue
      ignore_errors: yes

    - name: "[Windows Firewall] 透過標準模組關閉所有區域的防火牆"
      community.windows.win_firewall:
        state: disabled
        profiles:
          - Domain
          - Private
          - Public
