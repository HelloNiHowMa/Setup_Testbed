---
# ==========================================
# 終極防禦版：全面禁止收集 Facts，靠 Inventory 決定命運
# ==========================================

- name: 斷開並封印所有機器的 Vagrant NAT 網卡
  hosts: all
  become: yes
  # 💡 架構師殺招：全面禁止 Facts，徹底根絕 Python 版本與依賴問題！
  gather_facts: no

  tasks:
    # ----------------------------------------------------
    # 1. 處理 Windows 艦隊 (請確保 inventory 有 [windows] 群組)
    # ----------------------------------------------------
    - name: 載入 Windows 處理邏輯
      ansible.builtin.include_tasks: tasks/disable_nat_windows.yml
      when: "'Windows' in group_names"

    # ----------------------------------------------------
    # 2. 處理 RedHat/CentOS 艦隊 (請確保 inventory 有 [redhat] 群組)
    # ----------------------------------------------------
    - name: 載入 NetworkManager 處理邏輯 (RHEL 系)
      ansible.builtin.include_tasks: tasks/disable_nat_nm.yml
      when: "'Redhat' in group_names"

    # ----------------------------------------------------
    # 3. 處理新版 Ubuntu 艦隊 (請確保 inventory 有 [ubuntu_modern] 群組)
    # ----------------------------------------------------
    - name: 載入 Netplan 處理邏輯 (新版 Ubuntu)
      ansible.builtin.include_tasks: tasks/disable_nat_netplan.yml
      when: "'Ubuntu' in group_names"

    # ----------------------------------------------------
    # 4. 處理 Kali 與老古董 Ubuntu 艦隊 (請確保 inventory 有對應群組)
    # ----------------------------------------------------
    - name: 載入 Legacy 處理邏輯 (Kali 與老古董 bWAPP)
      ansible.builtin.include_tasks: tasks/disable_nat_legacy.yml
      when: "'kali' in group_names or 'bWAPP' in group_names"
