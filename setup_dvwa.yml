---
- name: 在 Ubuntu 與 Rocky Linux 9 部署 DVWA 環境
  hosts: Ubuntu, Redhat
  become: yes

  vars:
    # 根據作業系統家族定義不同的變數
    pkg_list:
      Debian: [apache2, mariadb-server, php, php-mysql, php-gd, git, python3-pymysql]
      RedHat: [httpd, mariadb-server, php, php-mysqlnd, php-gd, git, python3-PyMySQL]
    apache_svc:
      Debian: [apache2]
      RedHat: [httpd, php-fpm]
    mysql_socket:
      Debian: /var/run/mysqld/mysqld.sock
      RedHat: /var/lib/mysql/mysql.sock

  tasks:
    - name: 0a. 更新 APT 套件庫快取 (僅限 Debian 體系)
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600  # 💡 講師小技巧：如果快取在 1 小時內更新過，就跳過，大幅節省時間！
      when: ansible_os_family == "Debian"

    - name: 0b. 更新 DNF 套件庫快取 (僅限 RedHat 體系)
      ansible.builtin.dnf:
        update_cache: yes
      when: ansible_os_family == "RedHat"
    
    - name: 1. 安裝環境所需套件 (自動辨識系統)
      ansible.builtin.package: # 💡 使用 package 模組會自動調用 apt 或 dnf
        name: "{{ pkg_list[ansible_os_family] }}"
        state: present

    - name: 2. 啟動 Web、PHP 與 MariaDB 服務
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: yes
      # 💡 關鍵修正：直接用 Jinja2 的 + 號，把兩個陣列合併成一個扁平清單
      loop: "{{ apache_svc[ansible_os_family] + ['mariadb'] }}"

    - name: 3. 建立資料庫與使用者
      block:
        - community.mysql.mysql_db:
            name: dvwa
            login_unix_socket: "{{ mysql_socket[ansible_os_family] }}"
        - community.mysql.mysql_user:
            name: dvwa_user
            password: dvwa_password
            priv: 'dvwa.*:ALL'
            host: localhost
            login_unix_socket: "{{ mysql_socket[ansible_os_family] }}"

    - name: 4. 下載與配置 DVWA
      block:
        - ansible.builtin.git:
            repo: 'https://github.com/digininja/DVWA.git'
            dest: /var/www/html/dvwa
            update: no
        - ansible.builtin.copy:
            src: /var/www/html/dvwa/config/config.inc.php.dist
            dest: /var/www/html/dvwa/config/config.inc.php
            remote_src: yes
            force: no

    - name: 5. 修改設定檔與權限 (修正版)
      block:
        # 💡 修正 1：適應新版 DVWA 的 PHP 陣列與 getenv 語法
        - ansible.builtin.replace:
            path: /var/www/html/dvwa/config/config.inc.php
            regexp: "{{ item.regexp }}"
            replace: "{{ item.replace }}"
          loop:
            - { regexp: "^\\$_DVWA\\[\\s*'db_user'\\s*\\].*", replace: "$_DVWA[ 'db_user' ] = 'dvwa_user';" }
            - { regexp: "^\\$_DVWA\\[\\s*'db_password'\\s*\\].*", replace: "$_DVWA[ 'db_password' ] = 'dvwa_password';" }
            - { regexp: "^\\$_DVWA\\[\\s*'default_security_level'\\s*\\].*", replace: "$_DVWA[ 'default_security_level' ] = 'low';" }
            
        # 💡 修正 2：對齊 DVWA 網頁要求的確切路徑
        - ansible.builtin.file:
            path: "/var/www/html/dvwa/{{ item }}"
            owner: "{{ (ansible_os_family == 'Debian') | ternary('www-data', 'apache') }}"
            mode: '0777' # 為了確保 Web Shell 實驗順暢，上傳目錄給予最寬鬆權限
            state: directory
            recurse: yes
          loop: 
            - hackable/uploads
            - config
            - external/phpids/lib/IDS/tmp

    # 💡 修正：先用 Shell 指令動態找出 Debian 系統真實的 php.ini 路徑
    - name: 5.4 動態尋找 Debian 體系的 php.ini 路徑
      ansible.builtin.shell: ls /etc/php/*/apache2/php.ini | head -n 1
      register: debian_php_ini_path
      when: ansible_os_family == 'Debian'
      changed_when: false # 告訴 Ansible 這只是一個查詢動作，不要亮黃色 changed

    # 💡 修正：將找出的路徑變數注入到 replace 模組中
    - name: 5.5 開啟 PHP allow_url_include (LFI/RFI 實驗必備)
      ansible.builtin.replace:
        # 使用 Jinja2 判斷式：如果是 Debian 就用剛剛查到的路徑，否則就用 RedHat 預設的 /etc/php.ini
        path: "{{ debian_php_ini_path.stdout if ansible_os_family == 'Debian' else '/etc/php.ini' }}"
        regexp: '^allow_url_include\s*=\s*Off'
        replace: 'allow_url_include = On'
      # 忽略找不到檔案的錯誤 (萬一 Ubuntu 版本不同導致 PHP 路徑變更時不至於中斷)
      ignore_errors: yes

    # ==========================================
    # 💡 Rocky 9 專屬：處理 SELinux 與防火牆
    # ==========================================
    - name: 6. (僅限 Rocky) 調整 SELinux 權限
      when: ansible_os_family == "RedHat"
      block:
        - name: 允許 Apache 寫入特定目錄
          community.general.sefcontext:
            target: '/var/www/html/dvwa/(uploads|external/phpids/lib/IDS/tmp)(/.*)?'
            setype: httpd_sys_rw_content_t
            state: present
        - name: 套用 SELinux 變更
          ansible.builtin.command: restorecon -Rv /var/www/html/dvwa
        - name: 允許 Apache 連線資料庫
          ansible.posix.seboolean:
            name: httpd_can_network_connect_db
            state: yes
            persistent: yes

    - name: 7. (僅限 Rocky) 開放防火牆 HTTP 埠口
      when: ansible_os_family == "RedHat"
      ansible.posix.firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes

    - name: 8. 重新啟動 Web 與 PHP 服務
      ansible.builtin.service:
        name: "{{ item }}"
        state: restarted
      loop: "{{ apache_svc[ansible_os_family] }}"
