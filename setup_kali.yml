---
- name: Kali Linux 實戰環境建置與個人化設定 (非 Vagrant 建立的機器)
  hosts: kali_2026_01
  # 💡 移除全域的 become: yes，預設以連線的帳號 (kali) 執行

  tasks:
    # ==========================================
    # 階段一：打通 SSH 免密碼任督二脈 (只需跑一次)
    # ==========================================
    - name: 將控制機的公鑰注入到 kali 的信任清單
      ansible.posix.authorized_key:
        user: kali
        state: present
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
        
    # ==========================================
    # 階段二：系統層級任務 (需要 Root 權限)
    # ==========================================
    - name: 更新 APT 套件庫並安裝必備軟體
      become: yes  # 💡 局部提權：執行 apt 需要 root 權限
      ansible.builtin.apt:
        name:
          - seclists
          - feroxbuster
          - rlwrap
          - dirsearch  # 💡 新增：安裝 dirsearch
        update_cache: yes
        state: present

    - name: 解壓縮 rockyou.txt (若尚未解壓縮)
      become: yes
      ansible.builtin.command:
        cmd: gunzip -k /usr/share/wordlists/rockyou.txt.gz
      args:
        creates: /usr/share/wordlists/rockyou.txt

    # ==========================================
    # 階段三：使用者層級任務 (kali 本人執行)
    # ==========================================
    # 預設就是用 kali 登入，且沒有加 become: yes，所以直接作用在 kali 身上
    - name: 設定 kali 使用者的 .vimrc (取消滑鼠、新增垂直光棒)
      ansible.builtin.blockinfile:
        path: ~/.vimrc  # 💡 直接用 ~ 代表當前使用者的家目錄
        create: yes
        mode: '0644'
        marker: "\" {mark} ANSIBLE MANAGED BLOCK"
        block: |
          " 取消 vi/vim 滑鼠點選功能
          set mouse=
          
          " 新增垂直的對齊光棒
          set cursorcolumn
          
          syntax on
          set number

    - name: 將 Git 預設編輯器改為 vim
      ansible.builtin.command:
        cmd: git config --global core.editor "vim"

# ==========================================
    # 階段三：使用者層級任務 (kali 本人執行)
    # ==========================================
    # (保留你原本的 ~/.vimrc 和 git config 任務)

    - name: 確保 XFCE 設定檔目錄存在
      ansible.builtin.file:
        path: ~/.config/xfce4/xfconf/xfce-perchannel-xml/
        state: directory
        mode: '0755'

    - name: 停用 XFCE 螢幕保護與自動鎖定 (xfce4-screensaver)
      ansible.builtin.copy:
        dest: ~/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-screensaver.xml
        mode: '0644'
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-screensaver" version="1.0">
            <property name="saver" type="empty">
              <property name="enabled" type="bool" value="false"/>
            </property>
            <property name="lock" type="empty">
              <property name="enabled" type="bool" value="false"/>
            </property>
          </channel>

    - name: 停用 XFCE 電源管理的螢幕休眠 (xfce4-power-manager)
      ansible.builtin.copy:
        dest: ~/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-power-manager.xml
        mode: '0644'
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-power-manager" version="1.0">
            <property name="xfce4-power-manager" type="empty">
              <property name="dpms-enabled" type="bool" value="false"/>
              <property name="blank-on-ac" type="int" value="0"/>
              <property name="dpms-on-ac-sleep" type="int" value="0"/>
              <property name="dpms-on-ac-off" type="int" value="0"/>
              <property name="lock-screen-suspend-hibernate" type="bool" value="false"/>
            </property>
          </channel>
