---
# ==========================================================
# 劇本一：建置 Active Directory 網域控制站 (DC1)
# ==========================================================
- name: Phase 1 - 建立 cyber.internal 網域控制站
  hosts: win2022_dc
  gather_facts: no
  vars:
    domain_name: "cyber.internal"
    # AD 復原模式安全密碼 (需符合 Windows 複雜度要求)
    safe_mode_password: "Pa$$w0rd" 

  tasks:
    - name: 1. 安裝 AD 網域服務 (AD-Domain-Services)
      ansible.windows.win_feature:
        name: AD-Domain-Services
        state: present
        include_management_tools: yes

    - name: 2. 升級為網域控制站 (建立新樹系)
      ansible.windows.win_domain:
        dns_domain_name: "{{ domain_name }}"
        safe_mode_password: "{{ safe_mode_password }}"
      register: domain_install

    - name: 3. 如果有建立新網域，自動重新啟動伺服器
      ansible.windows.win_reboot:
        msg: "AD 網域建立完成，正在重新啟動套用設定..."
        reboot_timeout: 600
      when: domain_install.changed

# ==========================================================
# 劇本二：設定 DNS 並將其他 4 台 Client 加入網域
# ==========================================================
- name: Phase 2 - 將成員伺服器與用戶端加入網域
  # 💡 進階靶向技巧：選擇 Windows AD 群組，但「排除(!)」DC1
  hosts: Windows_AD:!win2022_dc
  gather_facts: no
  vars:
    domain_name: "cyber.internal"
    dc_ip: "10.0.0.201"
    # Vagrant 機器升級 DC 後，原本的 vagrant 帳號會直接變成網域管理員
    domain_admin: "vagrant@cyber.internal"
    domain_password: "vagrant"

  tasks:
    - name: 1. 強制將網卡 DNS 指向 DC1 (加入網域的絕對先決條件)
      ansible.windows.win_dns_client:
        adapter_names: "*"
        ipv4_addresses:
          - "{{ dc_ip }}"
          
    - name: 2. 測試網域解析是否正常 (確保 DNS 有生效)
      ansible.windows.win_shell: "Resolve-DnsName {{ domain_name }}"
      changed_when: false

    - name: 3. 正式加入 cyber.internal 網域
      ansible.windows.win_domain_membership:
        dns_domain_name: "{{ domain_name }}"
        domain_admin_user: "{{ domain_admin }}"
        domain_admin_password: "{{ domain_password }}"
        state: domain
      register: domain_join

    - name: 4. 加入網域後自動重新啟動
      ansible.windows.win_reboot:
        msg: "已成功加入網域，正在重新啟動..."
        reboot_timeout: 600
      when: domain_join.reboot_required
# ==========================================================
# 劇本三：關閉防火牆與防毒軟體 (滲透測試靶場專用)
# ==========================================================
- name: Phase 3 - 關閉全網域電腦的防火牆與防毒軟體
  # 💡 直接鎖定 Windows_AD 群組，一次對 5 台機器下達指令
  hosts: Windows_AD
  gather_facts: no
  
  tasks:
    - name: 1. 關閉所有網路設定檔 (Domain, Private, Public) 的 Windows 防火牆
      # 利用 PowerShell 一次性將三種 Profile 的防火牆全部關閉
      ansible.windows.win_shell: Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False

    - name: 2. 關閉 Windows Defender 即時防護 (Real-time monitoring)
      ansible.windows.win_shell: Set-MpPreference -DisableRealtimeMonitoring $true
      # 💡 忽略錯誤：現代 Windows 有「防篡改保護」，有時會阻擋此指令，設定 ignore_errors 確保劇本不中斷
      ignore_errors: yes

    - name: 3. 透過登錄檔 (Registry) 強制停用 Windows Defender
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender
        name: DisableAntiSpyware
        data: 1
        type: dword
        state: present
