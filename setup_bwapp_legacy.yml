---
- name: 在極度老舊系統使用 Raw 模組暴力部署 bWAPP
  hosts: ubuntu12, ubuntu14
  become: yes
  # 💡 絕對關鍵：關閉收集機器資訊，禁止 Ansible 去探測環境，不然一開場就會觸發 Python 錯誤！
  gather_facts: no  

  tasks:
    - name: 執行全自動 Shell 腳本 (繞過 Python 依賴限制)
      ansible.builtin.raw: |
        # 1. 修復 APT 來源 (指向 old-releases)
        sed -i 's/archive.ubuntu.com/old-releases.ubuntu.com/g' /etc/apt/sources.list
        sed -i 's/security.ubuntu.com/old-releases.ubuntu.com/g' /etc/apt/sources.list
        apt-get update

        # 2. 安裝原生 LAMP 套件
        export DEBIAN_FRONTEND=noninteractive
        apt-get install -y apache2 mysql-server php5 php5-mysql unzip wget

        # 3. 自動判斷網頁根目錄 (Ubuntu 12 vs 14)
        if [ -d "/var/www/html" ]; then
            WEB_ROOT="/var/www/html"
        else
            WEB_ROOT="/var/www"
        fi

        # 4. 下載與解壓 bWAPP (如果還沒下載過的話)
        if [ ! -d "$WEB_ROOT/bWAPP" ]; then
            wget -q --no-check-certificate https://sourceforge.net/projects/bwapp/files/bWAPP/bWAPPv2.2/bWAPP_latest.zip/download -O /tmp/bwapp.zip
            unzip -q -o /tmp/bwapp.zip -d $WEB_ROOT/
        fi

        # 5. 配置資料庫連線與權限
        chown -R www-data:www-data $WEB_ROOT/bWAPP
        chmod -R 777 $WEB_ROOT/bWAPP
        sed -i 's/$db_username = "root";/$db_username = "bwapp_user";/g' $WEB_ROOT/bWAPP/admin/settings.php
        sed -i 's/$db_password = "bug";/$db_password = "bwapp_password";/g' $WEB_ROOT/bWAPP/admin/settings.php

        # 6. 建立資料庫與使用者
        service mysql start
        mysql -u root -e "CREATE DATABASE IF NOT EXISTS bWAPP;"
        mysql -u root -e "GRANT ALL PRIVILEGES ON bWAPP.* TO 'bwapp_user'@'localhost' IDENTIFIED BY 'bwapp_password';"
        mysql -u root -e "FLUSH PRIVILEGES;"
        
        # 7. 重啟網頁伺服器
        service apache2 restart
