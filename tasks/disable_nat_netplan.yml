---
# tasks/disable_nat_netplan.yml
- name: "[Netplan] 尋找私有網路網卡名稱 (10.0.0.x 網段)"
  ansible.builtin.shell: |
    ip -4 addr show | grep 'inet 10.0.0.' | awk '{print $NF}'
  register: netplan_pri_iface
  changed_when: false

- name: "[Netplan] 尋找 NAT 網卡名稱 (搜尋 10.0.2.x 網段)"
  ansible.builtin.shell: |
    ip -4 addr show | grep 'inet 10.0.2.' | awk '{print $NF}'
  register: netplan_nat_iface
  changed_when: false

- name: "[Netplan] 建立自訂路由與 DNS 覆寫檔 (99-custom-routing.yaml)"
  # 💡 架構師思維：不改原檔，直接新增覆寫檔，避免 YAML 縮排災難
  ansible.builtin.copy:
    dest: /etc/netplan/99-custom-routing.yaml
    content: |
      network:
        version: 2
        ethernets:
          {{ netplan_pri_iface.stdout }}:
            routes:
              - to: 0.0.0.0/0
                via: {{ lab_gateway }}
            nameservers:
              addresses: [{{ lab_dns }}]
    mode: '0600'
  when: netplan_pri_iface.stdout | default('') != ""
  register: netplan_route_file

- name: "[Netplan] 建立 NAT 停用覆寫檔 (98-disable-nat.yaml)"
  ansible.builtin.copy:
    dest: /etc/netplan/98-disable-nat.yaml
    content: |
      network:
        version: 2
        ethernets:
          {{ netplan_nat_iface.stdout }}:
            dhcp4: false
            optional: true
    mode: '0600'
  when: netplan_nat_iface.stdout | default('') != ""
  register: netplan_nat_file

- name: "[Netplan] 套用 Netplan 設定"
  ansible.builtin.command: netplan apply
  when: netplan_route_file is changed or netplan_nat_file is changed
  ignore_errors: yes

- name: "[Netplan] 物理性關閉 NAT 網卡 (ip link set down)"
  ansible.builtin.command: "ip link set {{ netplan_nat_iface.stdout }} down"
  when: netplan_nat_iface.stdout | default('') != ""
  ignore_errors: yes
