# ==========================================
# 💡 進階技巧：群組的群組 (Children)
# ==========================================
# 你原本寫了 [Victim]，但在 Ansible 裡，最優雅的做法是
# 讓 Victim 成為一個「父群組」，自動包含底下的子群組。
