---
- name: Kali Linux 實戰環境建置與個人化設定 (無 Vagrant 帳號版)
  hosts: Attacker
  # 💡 移除全域的 become: yes，預設以連線的帳號 (kali) 執行

  tasks:
    # ==========================================
    # 階段一：打通 SSH 免密碼任督二脈 (只需跑一次)
    # ==========================================
    - name: 將控制機的公鑰注入到 kali 的信任清單
      ansible.posix.authorized_key:
        user: kali
        state: present
        # 💡 關鍵改變：用 lookup('file', ...) 讀取「控制機」本機的公鑰檔案
        # 假設你的公鑰叫 lab_key.pub 且放在跟 playbook 同一個資料夾下：
        key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"
        
        # (如果你是用 ssh-keygen 預設產生的，路徑會是 '~/.ssh/id_rsa.pub')

    # ==========================================
    # 階段二：系統層級任務 (需要 Root 權限)
    # ==========================================
    - name: 更新 APT 套件庫並安裝必備軟體
      become: yes  # 💡 局部提權：執行 apt 需要 root 權限
      ansible.builtin.apt:
        name:
          - seclists
          - feroxbuster
        update_cache: yes
        state: present

    - name: 解壓縮 rockyou.txt (若尚未解壓縮)
      become: yes  # 💡 局部提權
      ansible.builtin.command:
        cmd: gunzip -k /usr/share/wordlists/rockyou.txt.gz
      args:
        creates: /usr/share/wordlists/rockyou.txt

    # ==========================================
    # 階段三：使用者層級任務 (kali 本人執行)
    # ==========================================
    # 因為我們預設就是用 kali 登入，且沒有加 become: yes，所以直接作用在 kali 身上
    - name: 設定 kali 使用者的 .vimrc (取消滑鼠、新增垂直光棒)
      ansible.builtin.blockinfile:
        path: ~/.vimrc  # 💡 直接用 ~ 代表當前使用者的家目錄
        create: yes
        mode: '0644'
        marker: "\" {mark} ANSIBLE MANAGED BLOCK"
        block: |
          " 取消 vi/vim 滑鼠點選功能
          set mouse=
          
          " 新增垂直的對齊光棒
          set cursorcolumn
          
          syntax on
          set number

    - name: 將 Git 預設編輯器改為 vim
      ansible.builtin.command:
        cmd: git config --global core.editor "vim"
