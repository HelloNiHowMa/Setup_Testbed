---
# tasks/disable_nat_legacy.yml
- name: "[Legacy] 使用 raw 模組執行純 Bash 指令 (不依賴 Python)"
  ansible.builtin.raw: |
    # 1. 找出 NAT 網卡名稱
    IFACE=$(ip -4 addr show | grep 'inet 10.0.2.' | awk '{print $NF}')
    
    if [ ! -z "$IFACE" ]; then
      echo ">>> 找到 NAT 網卡: $IFACE"
      
      # 2. 備份設定檔
      cp /etc/network/interfaces /etc/network/interfaces.bak
      
      # 3. 使用 sed 直接修改檔案，把包含該網卡的行註解掉
      sed -i -e "s/^auto $IFACE/#auto $IFACE/g" -e "s/^iface $IFACE/#iface $IFACE/g" /etc/network/interfaces
      
      # 4. 物理性關閉網卡 (忽略報錯)
      ifdown $IFACE 2>/dev/null || true
      ip link set $IFACE down 2>/dev/null || true
      
      echo ">>> 網卡 $IFACE 已成功封印"
    else
      echo ">>> 未找到 10.0.2.x 網段的 NAT 網卡"
    fi
  register: raw_result
  changed_when: "'已成功封印' in raw_result.stdout"
